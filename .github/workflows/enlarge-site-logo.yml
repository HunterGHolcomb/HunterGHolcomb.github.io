name: Enlarge Site Logo

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  enlarge-logo:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Increase top-left logo size across pages
        run: |
          python3 <<'PY'
          from pathlib import Path

          replacements = {
              "width: 165px;\n      max-height: 48px;": "width: 230px;\n      max-height: 70px;",
              "width: 165px; max-height: 48px;": "width: 230px; max-height: 70px;",
              "width: 158px;\n         max-height: 46px;": "width: 205px;\n         max-height: 62px;",
              "width: 158px; max-height: 46px;": "width: 205px; max-height: 62px;",
          }

          changed = []
          for path in sorted(Path('.').glob('*.html')):
              text = path.read_text(encoding='utf-8')
              updated = text
              for old, new in replacements.items():
                  updated = updated.replace(old, new)

              if updated != text:
                  path.write_text(updated, encoding='utf-8')
                  changed.append(str(path))

          if changed:
              print('Updated files: ' + ', '.join(changed))
          else:
              print('No logo size changes needed.')
          PY

      - name: Commit updated pages
        run: |
          if git diff --quiet; then
            echo "No HTML changes needed."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/enlarge-site-logo.yml
          git add *.html
          git commit -m "Increase header logo size"
          git push
