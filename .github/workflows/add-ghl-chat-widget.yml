name: Add GHL Chat Widget

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  add-widget:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Add GoHighLevel chat widget to HTML pages
        run: |
          python3 <<'PY'
          from pathlib import Path

          widget = '<script src="https://widgets.leadconnectorhq.com/loader.js" data-resources-url="https://widgets.leadconnectorhq.com/chat-widget/loader.js" data-widget-id="6a38561ccab3f1c171444ecc" data-source="WEB_USER"></script>'
          marker = 'data-widget-id="6a38561ccab3f1c171444ecc"'

          changed = []
          for path in sorted(Path('.').glob('*.html')):
              html = path.read_text(encoding='utf-8')
              if marker in html:
                  continue

              closing = html.lower().rfind('</body>')
              if closing == -1:
                  print(f'Skipped {path}: no closing body tag')
                  continue

              updated = html[:closing] + f'  {widget}\n' + html[closing:]
              path.write_text(updated, encoding='utf-8')
              changed.append(str(path))

          if changed:
              print('Updated files: ' + ', '.join(changed))
          else:
              print('No files needed updates.')
          PY

      - name: Commit updated pages
        run: |
          if git diff --quiet; then
            echo "No HTML changes needed."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/add-ghl-chat-widget.yml
          git add *.html
          git commit -m "Add GoHighLevel chat widget to site"
          git push
