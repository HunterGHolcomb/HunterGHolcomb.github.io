name: Add Footer Contact Info

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  add-footer-contact-info:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Add footer contact info
        run: |
          python3 <<'PY'
          from pathlib import Path
          contact = '''      <div class="footer-contact" aria-label="Business contact information" style="color: #D1D5DB; font-size: 0.9rem; line-height: 1.55;">
        <p style="margin: 0 0 4px;"><strong style="color: #FFFFFF;">MarketWon LLC</strong></p>
        <p style="margin: 0 0 4px;">McKinney, TX 75071</p>
        <p style="margin: 0;">contact@marketwonagency.com · (469) 617-2237</p>
      </div>
'''
          needle = '      <div class="footer-links" aria-label="Footer links">'
          changed = []
          for path in sorted(Path('.').glob('*.html')):
              html = path.read_text(encoding='utf-8')
              if 'class="footer-contact"' not in html and needle in html:
                  path.write_text(html.replace(needle, contact + needle, 1), encoding='utf-8')
                  changed.append(str(path))
          print(changed)
          PY

      - name: Commit changes
        run: |
          if git diff --quiet; then
            echo "No changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add *.html
          git commit -m "Add footer contact information"
          git push
